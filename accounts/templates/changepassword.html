<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MVSR Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/e8fec16106.js" crossorigin="anonymous"></script>
    <style type="text/tailwindcss">
        @layer components {
            .form-input {
                @apply w-full px-4 py-3 bg-white/80 border border-gray-200 rounded-lg 
                       focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none 
                       transition-all duration-200 text-sm sm:text-base;
            }

            .form-label {
                @apply block text-gray-700 font-medium mb-2 text-sm sm:text-base;
            }

            .btn-primary {
                @apply w-full px-6 py-3 bg-blue-600 text-white rounded-lg font-semibold
                       hover:bg-blue-700 transition-all duration-200 flex items-center justify-center
                       gap-2 disabled:opacity-50 disabled:cursor-not-allowed text-sm sm:text-base;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-800 to-blue-900 min-h-screen flex items-center justify-center">
    <!-- Main Content -->
    <div class="w-full max-w-md mx-auto p-4 sm:p-6">
        <div class="bg-white/10 backdrop-blur-lg rounded-xl p-6 sm:p-8 shadow-xl">
            <h2 class="text-2xl sm:text-3xl font-bold text-white mb-6 flex items-center gap-2">
                <i class="fas fa-key"></i>
                Reset Password
            </h2>

            <form id="changePasswordForm" class="space-y-6">
                <div>
                    <label for="newPassword" class="form-label text-white">New Password</label>
                    <div class="relative">
                        <input type="password" 
                               id="newPassword" 
                               class="form-input pr-10" 
                               required>
                        <button type="button" 
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
                                onclick="togglePassword('newPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label for="confirmPassword" class="form-label text-white">Confirm New Password</label>
                    <div class="relative">
                        <input type="password" 
                               id="confirmPassword" 
                               class="form-input pr-10" 
                               required>
                        <button type="button" 
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
                                onclick="togglePassword('confirmPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-save"></i>
                    Reset Password
                </button>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm hidden z-50 flex items-center justify-center">
        <div class="bg-white p-6 sm:p-8 rounded-xl shadow-xl flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 sm:h-12 sm:w-12 border-4 border-blue-500 border-t-transparent"></div>
            <p class="mt-4 text-gray-700 text-sm sm:text-base">Resetting password...</p>
        </div>
    </div>

    <!-- Success Message -->
    <div id="successMessage" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm hidden z-50 flex items-center justify-center">
        <div class="bg-white p-6 sm:p-8 rounded-xl shadow-xl max-w-sm w-full mx-4">
            <div class="text-center">
                <i class="fas fa-check-circle text-green-500 text-5xl mb-4"></i>
                <h3 class="text-xl font-bold text-gray-800 mb-2">Password Reset!</h3>
                <p class="text-gray-600 mb-4">Your password has been successfully updated.</p>
                <p class="text-gray-500 text-sm">Redirecting to login page...</p>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const button = input.nextElementSibling;
            const icon = button.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Handle form submission
        document.getElementById('changePasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Basic validation
            if (newPassword !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            // Get token from URL
            const urlParts = window.location.pathname.split("/").filter(part => part);
            const token = urlParts[urlParts.length - 1];

            // Show loading overlay
            document.getElementById('loadingOverlay').classList.remove('hidden');

            try {
                const response = await fetch('/reset-password/'+token+'/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({
                        token: token,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Hide loading overlay
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    // Show success message
                    document.getElementById('successMessage').classList.remove('hidden');
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/login/';
                    }, 2000);
                } else {
                    // Hide loading overlay and show error
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    alert(data.error || 'Failed to reset password');
                }
            } catch (error) {
                // Hide loading overlay and show error
                document.getElementById('loadingOverlay').classList.add('hidden');
                alert('An error occurred. Please try again.');
            }
        });
    </script>
</body>
</html>
