<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Projects - MVSR Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/e8fec16106.js" crossorigin="anonymous"></script>
  <style type="text/tailwindcss">
    @layer components {
      .nav-link {
        @apply px-4 py-2 text-white font-semibold rounded-lg transition-all duration-200
        hover:bg-yellow-400 hover:text-blue-900 flex items-center gap-2;
      }
      
      .form-input {
        @apply w-full p-3 bg-white/80 border border-gray-200 rounded-lg 
        focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none 
        transition-all duration-200;
      }

      .course-tab {
        @apply px-6 py-3 font-semibold transition-all duration-200 hover:text-yellow-400;
      }

      .section-tab {
        @apply px-6 py-3 font-semibold transition-all duration-200 
        hover:bg-white/10 rounded-lg cursor-pointer;
      }

      .project-card {
        @apply bg-white/10 backdrop-blur-lg p-6 rounded-xl shadow-lg 
        hover:bg-white/20 transition-all duration-200 cursor-pointer;
      }

      .course-tabs-container {
        @apply bg-blue-950/50 backdrop-blur-lg rounded-xl p-2 mb-6 
        flex flex-wrap justify-center gap-2 mx-auto;
      }

      .course-tab {
        @apply px-6 py-3 font-semibold transition-all duration-200 rounded-lg
        border-2 border-transparent flex items-center gap-2 min-w-[200px]
        justify-center whitespace-nowrap;
      }

      .course-tab.active {
        @apply bg-white/10 border-yellow-500 text-yellow-500;
      }

      .course-tab:not(.active) {
        @apply text-white/80 hover:bg-white/5 hover:text-yellow-400;
      }

      .course-icon {
        @apply text-lg;
      }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-800 to-blue-900 min-h-screen">
  <!-- Navigation -->
  <nav class="bg-blue-950/90 backdrop-blur-lg sticky top-0 z-50 px-4 py-3 shadow-lg">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="/"><h1 class="text-3xl text-yellow-500 font-bold">MVSR Connect</h1></a>
      
      <div class="flex items-center gap-3">
        {% if request.user.role == "Student" %}
          <a href="/projects/createproject/" class="nav-link">
            <i class="fas fa-plus-circle"></i>
            Create Project
          </a>
        {% elif request.user.role == 'Incharge' %}
          <a href="/projects/createcourse/" class="nav-link">
            <i class="fas fa-book"></i>
            Create Course
          </a>
        {% endif %}
        <a href="/jobsapi/" class="nav-link">
          <i class="fas fa-briefcase"></i>
          Jobs
        </a>
        <a href="/projects/viewprojects/" class="nav-link">
          <i class="fas fa-project-diagram"></i>
          Projects
        </a>
        <div class="relative group">
          <a href="/profile/{{request.user.id}}" class="nav-link flex items-center gap-2">
            <span class="w-8 h-8 bg-yellow-500 rounded-full flex items-center justify-center text-blue-900 font-bold">
              {{ userdisplay|first }}
            </span>
            <span>{{ userdisplay }}</span>
          </a>
        </div>
        <a href="/logout/" class="nav-link">
          <i class="fas fa-sign-out-alt"></i>
          Logout
        </a>
      </div>
    </div>
  </nav>

  <div class="flex">
    <!-- Left Side: Dynamic Content -->
    <div id="left-content" class="w-full lg:w-3/4 p-6">
      <div class="bg-white/10 backdrop-blur-lg rounded-xl p-6 mb-6">
        <h2 class="text-2xl font-bold text-white mb-4 flex items-center gap-2">
          <i class="fas fa-project-diagram"></i>
          Projects
        </h2>
        <p class="text-white/80">Loading batch data...</p>
      </div>
    </div>

    <!-- Right Sidebar: Batch Selection -->
    <div class="hidden lg:block lg:w-1/4 bg-blue-950/30 backdrop-blur-lg min-h-screen p-6">
      <div class="sticky top-24">
        <h3 class="text-xl font-semibold text-white mb-4 flex items-center gap-2">
          <i class="fas fa-filter"></i>
          Filter Projects
        </h3>
        
        <div class="space-y-4">
          <div>
            <label for="batch" class="block text-white font-medium mb-2">Select Batch</label>
            <select id="batch" class="form-input">
              <option value="">Select Batch</option>
              <!-- Options will be added dynamically -->
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- JavaScript: Fetch data and dynamically update content -->
  <script>
    let batchData = [];

    // Fetch batch/course/section data from the backend.
    async function fetchBatchData() {
      try {
        const response = await fetch("/projects/fetchbatches/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            'X-CSRFToken': '{{ csrf_token }}'
          }
        });
        if (!response.ok) throw new Error("Network response was not ok");
        const data = await response.json();
        // Data is in the format:
        // { "batches": [2025, {batch:2025, sections:[...], courses:[...]}, 2026, {batch:2026, ...}, ...] }
        // Filter out numeric entries.
        batchData = data.batches.filter(item => typeof item === "object");
        populateBatchDropdown();
        if (batchData.length) {
          document.getElementById("batch").value = batchData[0].batch;
          updateLeftContent(batchData[0].batch);
        } else {
          document.getElementById("left-content").innerHTML = '<p class="text-white text-center">No batch data available.</p>';
        }
      } catch (error) {
        console.error("Error fetching batch data:", error);
        document.getElementById("left-content").innerHTML = '<p class="text-white text-center">Error loading batch data.</p>';
      }
    }

    // Populate the batch dropdown.
    function populateBatchDropdown() {
      const batchSelect = document.getElementById("batch");
      batchData.forEach(function(batchObj) {
        const option = document.createElement("option");
        option.value = batchObj.batch;
        option.textContent = batchObj.batch + " Batch";
        batchSelect.appendChild(option);
      });
    }

    // Build and update the left-side content for the selected batch.
    function updateLeftContent(selectedBatch) {
      const leftContent = document.getElementById("left-content");
      const batchObj = batchData.find(b => b.batch == selectedBatch);
      if (!batchObj) {
        leftContent.innerHTML = '<p class="text-white text-center">Select a batch to view content.</p>';
        return;
      }
      const courses = batchObj.courses;    // Array of course objects.
      const sections = batchObj.sections;    // Array of section names.
      let html = '';

      // Build Course Tabs (Main Tabs)
      html += '<div id="main-tabs" class="course-tabs-container">';
      courses.forEach(function(course, index) {
        html += `
          <a id="course-tab-${index}" 
             data-target="course-content-${index}" 
             data-course-id="${course.id}" 
             href="#" 
             class="course-tab ${index === 0 ? 'active' : ''}">
              <i class="fas fa-book-open course-icon"></i>
              <span>${course.name}</span>
          </a>`;
      });
      html += '</div>';

      // Build content for each course.
      courses.forEach(function(course, index) {
        // Container holds course id.
        html += '<div id="course-content-' + index + '" data-course-id="' + course.id + '" class="course-content ' + (index === 0 ? '' : 'hidden') + '">';
        // Build Section Tabs for this course.
        html += '<div class="w-3/4 mx-auto flex justify-evenly text-white bg-blue-950 font-averia text-xl mt-6 rounded-sm">';
        sections.forEach(function(section, sIndex) {
          html += '<div id="section-tab-' + index + '-' + sIndex + '" data-target="section-content-' + index + '-' + sIndex + '" data-section="' + section + '" class="section-tab tab-group-2-container w-1/3 p-2 rounded-md text-center cursor-pointer ' +
                  (sIndex === 0 ? 'bg-white text-yellow-500' : '') + '">';
          html += '<a href="#" class="px-4 py-2 ' + (sIndex === 0 ? 'text-yellow' : 'hover:text-yellow-500') + '">Section ' + section + '</a>';
          html += '</div>';
        });
        html += '</div>';
        // Build Section Content containers (initially empty; projects will load on click).
        sections.forEach(function(section, sIndex) {
          html += '<div id="section-content-' + index + '-' + sIndex + '" class="section-content w-3/4 mx-auto p-7 flex flex-wrap gap-5 ' + (sIndex === 0 ? '' : 'hidden') + '">';
          html += '</div>';
        });
        html += '</div>'; // End course-content.
      });

      leftContent.innerHTML = html;

      // Attach event listeners for course tabs.
      document.querySelectorAll('.course-tab').forEach(function(tab) {
        tab.addEventListener('click', function(e) {
          e.preventDefault();
          document.querySelectorAll('.course-tab').forEach(function(t) {
            t.classList.remove('active');
          });
          tab.classList.add('active');

          document.querySelectorAll('.course-content').forEach(function(content) {
            content.classList.add('hidden');
          });
          const targetId = tab.getAttribute('data-target');
          document.getElementById(targetId).classList.remove('hidden');
        });
      });

      // Attach event listeners for section tabs.
      document.querySelectorAll('.section-tab').forEach(function(tab) {
        tab.addEventListener('click', function(e) {
          e.preventDefault();
          const parentCourse = tab.closest('.course-content');
          parentCourse.querySelectorAll('.section-tab').forEach(function(t) {
            t.classList.remove('bg-white', 'text-yellow-500');
          });
          tab.classList.add('bg-white', 'text-yellow-500');

          parentCourse.querySelectorAll('.section-content').forEach(function(content) {
            content.classList.add('hidden');
          });
          const targetId = tab.getAttribute('data-target');
          document.getElementById(targetId).classList.remove('hidden');

          // Get values needed for project fetch.
          const courseId = parentCourse.getAttribute('data-course-id');
          const batch = document.getElementById('batch').value;
          const section = tab.getAttribute('data-section');
          fetchProjects(courseId, batch, section, targetId);
        });
      });
    }

    // Fetch projects for the selected course, batch, and section.
    async function fetchProjects(courseId, batch, section, targetId) {
      try {
        const response = await fetch("/projects/getprojects/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            'X-CSRFToken': '{{ csrf_token }}'
          },
          body: JSON.stringify({
            batch: batch,
            section: section,
            course_id: courseId
          })
        });
        if (!response.ok) throw new Error("Network response was not ok");
        const data = await response.json();
        let html = '';
        if (data.projects.length === 0) {
          html = '<p class="text-center text-gray-700">No projects available.</p>';
        } else {
          data.projects.forEach(project => {
            html += `
              <a href="/projects/${project.id}/">
                <div class="project-card">
                  <h3 class="text-xl font-bold text-white text-center">${project.nick_name}</h3>
                </div>
              </a>
            `;
          });
        }
        document.getElementById(targetId).innerHTML = html;
      } catch (error) {
        console.error("Error fetching projects:", error);
        document.getElementById(targetId).innerHTML = '<p class="text-center text-red-500">Error loading projects.</p>';
      }
    }

    // Listen for changes on the batch dropdown.
    document.getElementById("batch").addEventListener("change", function() {
      const selectedBatch = this.value;
      updateLeftContent(selectedBatch);
    });

    // On page load, fetch the batch data.
    fetchBatchData();
  </script>
</body>
</html>
