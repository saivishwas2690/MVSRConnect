<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Courses - MVSR Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/e8fec16106.js" crossorigin="anonymous"></script>
    <style type="text/tailwindcss">
        @layer components {
            .nav-link {
                @apply px-4 py-2 text-white font-semibold rounded-lg transition-all duration-200
                hover:bg-yellow-400 hover:text-blue-900 flex items-center gap-2;
            }
            
            .card {
                @apply bg-white rounded-xl shadow-lg hover:shadow-xl transition-all duration-300
                border border-gray-100;
            }
            
            .section-title {
                @apply text-xl font-bold text-gray-800 mb-4 flex items-center gap-2;
            }

            .filter-btn {
                @apply px-4 py-2 rounded-lg font-semibold transition-all duration-200
                flex items-center gap-2;
            }

            .filter-btn.active {
                @apply bg-blue-600 text-white;
            }

            .filter-btn:not(.active) {
                @apply bg-gray-100 text-gray-700 hover:bg-gray-200;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-800 to-blue-900 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-blue-950/90 backdrop-blur-lg sticky top-0 z-50 px-4 py-3 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/"><h1 class="text-3xl text-yellow-500 font-bold">MVSR Connect</h1></a>
            
            <div class="flex items-center gap-3">
                <a href="/projects/createcourse/" class="nav-link">
                    <i class="fas fa-plus-circle"></i>
                    Create Course
                </a>
                <a href="/jobsapi/" class="nav-link">
                    <i class="fas fa-briefcase"></i>
                    Jobs
                </a>
                <a href="/projects/viewprojects/" class="nav-link">
                    <i class="fas fa-project-diagram"></i>
                    Projects
                </a>
                <div class="relative group">
                    <a href="/profile/{{request.user.id}}" class="nav-link flex items-center gap-2">
                        <span class="w-8 h-8 bg-yellow-500 rounded-full flex items-center justify-center text-blue-900 font-bold">
                            {{ userdisplay|first }}
                        </span>
                        <span>{{ userdisplay }}</span>
                    </a>
                </div>
                <a href="/logout/" class="nav-link">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <div class="card p-6 mb-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-4">Course Management</h1>
            
            <!-- Filters -->
            <div class="space-y-4">
                <!-- Batch Filter -->
                <div>
                    <label class="text-gray-700 font-semibold mb-2 block">Batch</label>
                    <div class="flex flex-wrap gap-2" id="batchFilter">
                        <!-- Batch filters will be rendered here -->
                    </div>
                </div>

                <!-- Requirements Filter -->
                <div class="flex flex-wrap gap-4">
                    <button onclick="toggleFilter('requiresGuide')" 
                            class="filter-btn" 
                            id="requiresGuideBtn">
                        <i class="fas fa-chalkboard-teacher"></i>
                        Requires Guide
                    </button>
                    <button onclick="toggleFilter('requiresInternship')" 
                            class="filter-btn" 
                            id="requiresInternshipBtn">
                        <i class="fas fa-briefcase"></i>
                        Requires Internship
                    </button>
                </div>
            </div>
        </div>

        <!-- Courses Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="coursesGrid">
            <!-- Loading State -->
            <div class="col-span-full flex justify-center py-12" id="loadingState">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
            </div>
        </div>
    </div>

    <script>
    // Filter state
    let filters = {
        batch: null,
        requiresGuide: false,
        requiresInternship: false
    };

    let allCourses = [];

    async function fetchCourses() {
        try {
            const response = await fetch('/projects/courses/', {
                method: 'FETCH',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                }
            });

            if (!response.ok) throw new Error('Failed to fetch courses');
            
            const result = await response.json();
            allCourses = result.data;
            
            // Extract unique batches
            const batches = [...new Set(allCourses.map(course => course.batch))].sort();
            renderBatchFilters(batches);
            
            // Initial render
            renderCourses();
            
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('coursesGrid').innerHTML = `
                <div class="col-span-full text-center py-12">
                    <div class="text-red-500 font-semibold">
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        Failed to load courses
                    </div>
                </div>
            `;
        } finally {
            document.getElementById('loadingState').style.display = 'none';
        }
    }

    function renderBatchFilters(batches) {
        const container = document.getElementById('batchFilter');
        container.innerHTML = `
            <button onclick="filterByBatch('all')" 
                    class="filter-btn ${!filters.batch ? 'active' : ''}">
                All Batches
            </button>
            ${batches.map(batch => `
                <button onclick="filterByBatch('${batch}')" 
                        class="filter-btn ${filters.batch === batch ? 'active' : ''}">
                    ${batch}
                </button>
            `).join('')}
        `;
    }

    function filterByBatch(batch) {
        filters.batch = batch === 'all' ? null : batch;
        renderCourses();
        updateFilterUI();
    }

    function toggleFilter(filter) {
        filters[filter] = !filters[filter];
        renderCourses();
        updateFilterUI();
    }

    function updateFilterUI() {
        // Update batch buttons
        document.querySelectorAll('#batchFilter button').forEach(btn => {
            const batchText = btn.textContent.trim();
            if ((batchText === 'All Batches' && !filters.batch) || 
                (batchText === filters.batch)) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        // Update requirement buttons
        document.getElementById('requiresGuideBtn').classList.toggle('active', filters.requiresGuide);
        document.getElementById('requiresInternshipBtn').classList.toggle('active', filters.requiresInternship);
    }

    function renderCourses() {
        const filteredCourses = allCourses.filter(course => {
            if (filters.batch && course.batch != filters.batch) return false;
            if (filters.requiresGuide && !course.requires_guide) return false;
            if (filters.requiresInternship && !course.requires_internship) return false;
            return true;
        });

        const grid = document.getElementById('coursesGrid');
        
        if (filteredCourses.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full text-center py-12 text-gray-500">
                    No courses match the selected filters
                </div>
            `;
            return;
        }

        grid.innerHTML = filteredCourses.map(course => `
            <a href="/projects/viewcoursedashboard/${course.id}/" 
               class="card p-6 flex flex-col hover:scale-105 transition-all duration-300 hover:shadow-2xl cursor-pointer min-h-[400px]">
                <div class="flex items-start justify-between mb-4">
                    <div class="flex-1">
                        <h2 class="text-xl font-bold text-gray-800 line-clamp-2">${course.title}</h2>
                        <p class="text-gray-600">${course.code}</p>
                    </div>
                    <span class="px-3 py-1 bg-yellow-100 text-yellow-800 rounded-full text-sm font-semibold ml-2 whitespace-nowrap">
                        ${course.batch}
                    </span>
                </div>

                <!-- Requirements Section: Fixed Height -->
                <div class="flex flex-wrap gap-2 mb-4 min-h-[40px]">
                    ${course.requires_guide ? `
                        <span class="px-2 py-1 bg-blue-100 text-blue-800 rounded-lg text-sm flex items-center gap-1">
                            <i class="fas fa-chalkboard-teacher"></i>
                            Guide Required
                        </span>
                    ` : ''}
                    ${course.requires_internship ? `
                        <span class="px-2 py-1 bg-green-100 text-green-800 rounded-lg text-sm flex items-center gap-1">
                            <i class="fas fa-briefcase"></i>
                            Internship Required
                        </span>
                    ` : ''}
                </div>

                <!-- Guide Limits Section: Fixed Height -->
                <div class="text-sm text-gray-600 space-y-3 flex-1">
                    <div class="flex flex-col gap-2">
                        <h3 class="font-semibold text-gray-700">Guide Limits</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="px-3 py-2 bg-blue-50 rounded-lg">
                                <span class="block text-blue-800 font-medium text-xs">Assistant Professor</span>
                                <span class="text-blue-600 text-lg font-bold">${course.limit_for_asst_prof}</span>
                            </div>
                            <div class="px-3 py-2 bg-purple-50 rounded-lg">
                                <span class="block text-purple-800 font-medium text-xs">Professor</span>
                                <span class="text-purple-600 text-lg font-bold">${course['limit_for prof']}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Domains Section: Fixed Height -->
                    <div class="min-h-[100px]">
                        ${course.requires_domain ? `
                            <div class="mt-4">
                                <h3 class="font-semibold text-gray-700 mb-2">Domains</h3>
                                <div class="flex flex-wrap gap-1">
                                    ${course.domains.map(domain => `
                                        <span class="px-2 py-1 bg-gradient-to-r from-gray-100 to-gray-50 
                                                     text-gray-700 rounded-lg text-xs font-medium
                                                     border border-gray-200">
                                            ${domain}
                                        </span>
                                    `).join('')}
                                </div>
                            </div>
                        ` : `
                            <div class="mt-4">
                                <h3 class="font-semibold text-gray-700 mb-2">Domains</h3>
                                <div class="text-gray-400 italic">No domain requirements</div>
                            </div>
                        `}
                    </div>
                </div>

                <!-- Footer Section: Fixed Position -->
                <div class="mt-auto pt-4 border-t border-gray-100 text-sm text-gray-500 flex items-center justify-between">
                    <span class="whitespace-nowrap">Created on ${new Date(course.course_creation_date).toLocaleDateString()}</span>
                    <span class="text-blue-600 flex items-center gap-1 whitespace-nowrap">
                        View Dashboard 
                        <i class="fas fa-arrow-right"></i>
                    </span>
                </div>
            </a>
        `).join('');
    }

    // Initialize
    fetchCourses();
    </script>
</body>
</html>
